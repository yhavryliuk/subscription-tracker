schema: ../../packages/graphql-schema/schema.gql
documents: ./src/features/**/*.graphql
generates:
  ./src/shared/api/graphql/graphqlApi.ts:
    plugins:
      - typescript
      - typescript-operations
      - typescript-react-query
    config:
      avoidOptionals: true
      immutableTypes: true
      enumsAsTypes: true
      nonOptionalTypename: true
      skipTypename: false
      fetcher:
        func: "@/shared/api/graphql-client#fetcher"
        isReactHook: false
      reactQueryVersion: 4
      exposeQueryKeys: true
